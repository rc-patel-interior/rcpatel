kind = "web"
previewPath = "/"
title = "RC Patel Interior"
version = "1.0.0"
id = "artifacts/rc-patel-interior"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21044

[services.development]
run = "pnpm --filter @workspace/rc-patel-interior run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rc-patel-interior", "run", "build" ]
publicDir = "artifacts/rc-patel-interior/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21044"
BASE_PATH = "/"
